<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AstroChat — Your AI companion for exploring questions about space, code, science, and everything in between.">
  <title>AstroChat · Space AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Full-bleed hero background -->
  <div id="cosmos">
    <img src="hero-bg.png" alt="" id="cosmos-img" />
    <div id="cosmos-vignette"></div>
  </div>

  <div id="shell">
    <!-- Topbar -->
    <nav id="topbar">
      <div class="nav-brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3.5" fill="#7c6aef"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="#7c6aef" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <span class="brand-name">astrochat</span>
        <span class="brand-sep">·</span>
        <span class="brand-tag">groq</span>
      </div>
      <div class="nav-actions">
        <button id="btn-new" class="nav-btn" title="New conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="nav-btn-label">New</span>
        </button>
      </div>
    </nav>

    <!-- Chat viewport -->
    <section id="viewport">
      <div id="scroll-track">

        <!-- Landing (shown initially) -->
        <div id="landing">
          <div class="landing-hero">
            <p class="landing-kicker">Hey there — I'm</p>
            <h2 class="landing-title">Astro<span class="accent-dot">.</span></h2>
            <p class="landing-desc">
              Your personal AI copilot built on Groq API.<br>
              Ask me about space, code, science, or anything on your mind.
            </p>
          </div>
          <div class="starters">
            <button class="starter" data-q="How do rockets escape Earth's gravity?">
              <span class="starter-icon">↗</span>
              <span>How do rockets escape Earth's gravity?</span>
            </button>
            <button class="starter" data-q="Write a JavaScript function to debounce user input">
              <span class="starter-icon">&lt;/&gt;</span>
              <span>Write a JS debounce function</span>
            </button>
            <button class="starter" data-q="Explain quantum entanglement like I'm 15">
              <span class="starter-icon">⚛</span>
              <span>Explain quantum entanglement simply</span>
            </button>
            <button class="starter" data-q="Give me 5 creative project ideas for a computer science student">
              <span class="starter-icon">◈</span>
              <span>CS project ideas for students</span>
            </button>
          </div>
        </div>

        <!-- Messages will be injected here -->
      </div>
    </section>

    <!-- Composer -->
    <div id="composer">
      <form id="compose-form" autocomplete="off">
        <div class="compose-row">
          <textarea id="prompt" rows="1" placeholder="Message Astro..." maxlength="4000"></textarea>
          <button type="submit" id="btn-send" disabled aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </form>
      <p class="compose-note">Groq can make mistakes — double-check important info.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
